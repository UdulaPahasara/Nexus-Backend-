spring.application.name=backend
server.port=8080

# This is a sample 256-bit secret key for HS256. In production, provide this via an environment variable.
jwt.secret=4f7a2b9e6c3d8a1f5e8b4c7d0a2f9e6c3d8a1f5e8b4c7d0a2f9e6c3d8a1f5e8b
# Expiration time for tokens in milliseconds (e.g., 3600000 ms = 1 hour)
jwt.expiration=3600000

# Database Configuration (Please update username/password to match your local setup)
spring.datasource.url=jdbc:mysql://localhost:3306/DBnexus?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
